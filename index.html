<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HIGHTAC SHOP</title>
    <meta name="description" content="Catalogue HIGHTAC - selection des modeles.">
    <link rel="icon" href="./Database/MotorPictures/download.png?v=20260511-grpic2">
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260511-2">
    <script src="./assets/js/access-guard.js?v=20260522-ipgate"></script>
  </head>
  <body>
    <div class="site-backdrop" aria-hidden="true">
      <span class="site-backdrop__grid"></span>
    </div>

    <main class="simple-page simple-page--home">
      <div class="price-notice">
        <span data-i18n="price_notice">Les prix sont bases sur les donnees de 2023 ; le devis final fait foi.</span>
        <strong class="version-badge" data-version>v2026.05.11.2</strong>
      </div>

      <header class="top-strip panel-surface panel-surface--header">
        <div class="top-strip__slot top-strip__slot--left">
          <div class="top-box top-box--yellow" data-i18n="home_shop">BOUTIQUE HIGHTAC</div>
        </div>
        <div class="top-strip__slot top-strip__slot--center">
          <div class="lang-switch" data-lang-switcher>
            <button class="lang-switch__button" type="button" data-lang="en">English</button>
            <button class="lang-switch__button" type="button" data-lang="fr">Francais</button>
            <button class="lang-switch__button" type="button" data-lang="ar">العربية</button>
          </div>
        </div>
        <div class="top-strip__slot top-strip__slot--right">
          <a class="top-box top-box--cyan" href="https://wa.me/8613602489689" data-i18n="home_whatsapp">
            WhatsApp
          </a>
        </div>
      </header>

      <section class="directory-panel panel-surface panel-surface--hero" aria-labelledby="directory-title">
        <div class="directory-panel__head">
          <div>
            <p class="directory-panel__eyebrow">HIGHTAC</p>
            <h1 id="directory-title" data-i18n="directory_title">Modeles</h1>
          </div>
          <span class="directory-panel__count" data-i18n="model_count">4 modeles</span>
        </div>

        <div class="model-grid" aria-label="HIGHTAC models">
          <a class="model-card" href="https://durovamotor.github.io/pythonProject13OnlineOrderGR/parts.html" aria-label="GR150 parts">
            <span class="model-card__visual">
              <img class="model-card__image" src="./Database/MotorPictures/download.png?v=20260511-grpic2" alt="GR150" draggable="false" data-protected-image>
            </span>
            <span class="model-card__body">
              <strong class="model-card__name">GR150</strong>
              <span class="model-card__action" data-i18n="open_parts">Pieces</span>
            </span>
          </a>

          <a class="model-card" href="https://durovamotor.github.io/pythonProject15OnlineOrderJoyMAX/parts.html" aria-label="JoyMAX parts">
            <span class="model-card__visual">
              <img class="model-card__image" src="./Database/MotorPictures/JoyMAX.png" alt="JoyMAX" draggable="false" data-protected-image>
            </span>
            <span class="model-card__body">
              <strong class="model-card__name">JoyMAX</strong>
              <span class="model-card__action" data-i18n="open_parts">Pieces</span>
            </span>
          </a>

          <a class="model-card" href="https://durovamotor.github.io/pythonProject16OnlineOrderST/parts.html" aria-label="ST parts">
            <span class="model-card__visual">
              <img class="model-card__image" src="./Database/MotorPictures/ST.webp" alt="ST" draggable="false" data-protected-image>
            </span>
            <span class="model-card__body">
              <strong class="model-card__name">ST</strong>
              <span class="model-card__action" data-i18n="open_parts">Pieces</span>
            </span>
          </a>

          <a class="model-card" href="https://durovamotor.github.io/pythonProject18OnlineOrderCapucino/parts.html" aria-label="Capucino parts">
            <span class="model-card__visual">
              <img class="model-card__image" src="./Database/MotorPictures/Capucino.png" alt="Capucino" draggable="false" data-protected-image>
            </span>
            <span class="model-card__body">
              <strong class="model-card__name">Capucino</strong>
              <span class="model-card__action" data-i18n="open_parts">Pieces</span>
            </span>
          </a>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var sources = [
          "./assets/js/app.js?v=20260511-2"
        ];

        function loadScript(src) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });
        }

        if (window.HIGHTAC_ACCESS_GUARD && window.HIGHTAC_ACCESS_GUARD.loadScripts) {
          window.HIGHTAC_ACCESS_GUARD.loadScripts(sources);
        } else {
          sources.reduce(function (promise, src) {
            return promise.then(function () {
              return loadScript(src);
            });
          }, Promise.resolve());
        }
      })();
    </script>
  </body>
</html>
